<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้านแอดมิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif !important;
        }
        .container.dashboard {
            max-width: 950px;
            width: 95%;
            margin: 40px auto;
            box-sizing: border-box;
        }
        
        /* สไตล์ปรับปรุงหัวข้อหลักให้รองรับมือถือ */
        .dashboard-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 25px;
            color: #1e293b;
        }
        /* บนคอมจอใหญ่ ให้ซ่อนการตัดบรรทัดบังคับ */
        .dashboard-title br.mobile-br {
            display: none;
        }

        /* โซนตัวกรองมินิมอล */
        .filter-section {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filter-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .filter-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-input-wrapper input[type="date"] {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
            -webkit-appearance: none;
        }
        .filter-input-wrapper input[type="date"]:focus {
            border-color: #3b82f6;
        }
        .date-separator {
            font-size: 0.95rem;
            font-weight: 500;
            color: #64748b;
        }
        .clear-filter-btn {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .clear-filter-btn:hover {
            background: #e2e8f0;
            color: #334155;
        }

        /* โครงสร้างตาราง */
        .table-responsive {
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            background: #fff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }
        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
            vertical-align: middle;
            white-space: nowrap; /* ป้องกันข้อความในตารางตัดขึ้นบรรทัดใหม่จนเบี้ยว */
        }
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f8fafc;
        }

        /* ปุ่ม ดูสลิป ดีไซน์พรีเมียม */
        .view-slip-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white !important;
            text-decoration: none !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
        }
        .view-slip-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            filter: brightness(1.05);
        }
        .view-slip-btn:active {
            transform: translateY(1px);
        }
        .no-slip-text {
            color: #94a3b8;
            font-size: 0.9rem;
            font-style: italic;
        }
        .loading-text {
            text-align: center;
            padding: 30px;
            font-size: 1.1rem;
            color: #64748b;
        }
        .logout-btn {
            background: #ef4444 !important;
            margin-top: 25px;
            width: auto !important;
            padding: 10px 25px !important;
            float: right;
            border-radius: 10px;
        }

        /* ==================== Responsive Style (สำหรับหน้าจอมือถือ) ==================== */
        @media (max-width: 600px) {
            .container.dashboard {
                margin: 20px auto;
                padding: 15px !important;
            }
            /* บังคับตัดคำว่า (แอดมิน) ลงมาบรรทัดล่าง และลดขนาดลงเล็กน้อยให้พอดีกล่อง */
            .dashboard-title {
                font-size: 1.6rem;
            }
            .dashboard-title br.mobile-br {
                display: block;
            }
            .filter-section {
                flex-direction: column;
                align-items: stretch;
                padding: 15px;
                text-align: center;
            }
            .filter-input-wrapper {
                flex-direction: column;
                width: 100%;
            }
            .filter-input-wrapper input[type="date"], .clear-filter-btn {
                width: 100%;
                box-sizing: border-box;
            }
            .date-separator {
                margin: 2px 0;
            }
            th, td {
                padding: 12px 14px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
            alert('กรุณาเข้าสู่ระบบก่อนครับ');
            window.location.href = 'admin-login.html';
        }
    </script>

    <div class="container dashboard">
        <h1 class="dashboard-title">ข้อมูลการจ่ายเงิน <br class="mobile-br">(แอดมิน)</h1>

        <div class="filter-section">
            <p class="filter-title">รายการชำระเงินทั้งหมด</p>
            <div class="filter-input-wrapper">
                <input type="date" id="startDate" onchange="filterAndRenderData()" placeholder="เริ่ม">
                <span class="date-separator">ถึง</span>
                <input type="date" id="endDate" onchange="filterAndRenderData()" placeholder="สิ้นสุด">
                <button class="clear-filter-btn" onclick="clearFilter()">แสดงทั้งหมด</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>เลขที่</th>
                        <th>วันที่จ่าย</th>
                        <th>หลักฐานการโอน</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="3" class="loading-text">กำลังดึงข้อมูลจาก Google Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </div>

    <script>
        const googleAppsScriptUrl = "https://script.google.com/macros/s/AKfycbw4JEb0sbTjHAKZlX2_Ecxp-5Wp8fuXymfQjcrnAbT9F9i6Md3P8a1Iz7XDveQEhHiu/exec"; 
        let rawData = [];

        async function fetchSheetData() {
            try {
                const response = await fetch(googleAppsScriptUrl);
                const data = await response.json();
                rawData = data;
                filterAndRenderData();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('dataTableBody').innerHTML = `
                    <tr><td colspan="3" style="text-align:center; color:#ef4444; font-weight:500; padding:20px;">
                        ไม่สามารถดึงข้อมูลได้อัตโนมัติ กรุณาเช็กการ Deploy บน Apps Script อีกครั้งครับ
                    </td></tr>`;
            }
        }

        // ฟังก์ชันล้างค่าตัวกรองวันที่ทั้งหมด
        function clearFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            filterAndRenderData();
        }

        // ฟังก์ชันหัวใจหลัก: ตรวจจับและกรองแบบช่วงวันที่ (Date Range)
        function filterAndRenderData() {
            const startVal = document.getElementById('startDate').value; 
            const endVal = document.getElementById('endDate').value; 
            let filtered = [...rawData];

            // แปลงค่าวันที่ที่กรอกให้กลายเป็นเลข Timestamp เพื่อนำไปเปรียบเทียบค่า (ช่วยป้องกันบัคเรื่อง format วันที่)
            const startTimestamp = startVal ? new Date(startVal + "T00:00:00").getTime() : null;
            const endTimestamp = endVal ? new Date(endVal + "T23:59:59").getTime() : null;

            // คัดกรองข้อมูลตามช่วงเวลา
            if (startTimestamp || endTimestamp) {
                filtered = filtered.filter(item => {
                    if (!item.paymentDate) return false;
                    const currentTimestamp = new Date(item.paymentDate + "T00:00:00").getTime();
                    
                    // เงื่อนไข 1: เลือกแค่วันเริ่มต้นอย่างเดียว (เอาตั้งแต่วันนั้นเป็นต้นไป)
                    if (startTimestamp && !endTimestamp) {
                        return currentTimestamp >= startTimestamp;
                    }
                    // เงื่อนไข 2: เลือกแค่วันสิ้นสุดอย่างเดียว (เอาตั้งแต่วันแรกสุดจนถึงวันนั้น)
                    if (!startTimestamp && endTimestamp) {
                        return currentTimestamp <= endTimestamp;
                    }
                    // เงื่อนไข 3: เลือกครบทั้งสองฝั่ง (คัดกรองระหว่างกลาง)
                    return currentTimestamp >= startTimestamp && currentTimestamp <= endTimestamp;
                });
            }

            // ระบบจัดเรียงข้อมูล: เลขที่ (น้อย -> มาก) และ วันที่จ่าย (เก่า -> ใหม่)
            filtered.sort((a, b) => {
                if (parseInt(a.studentId) !== parseInt(b.studentId)) {
                    return parseInt(a.studentId) - parseInt(b.studentId);
                }
                return new Date(a.paymentDate) - new Date(b.paymentDate);
            });

            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b; padding:20px;">ไม่พบข้อมูลในช่วงวันที่เลือก</td></tr>';
                return;
            }

            filtered.forEach(item => {
                const dateObj = new Date(item.paymentDate);
                const formattedDate = isNaN(dateObj) ? item.paymentDate : dateObj.toLocaleDateString('th-TH', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });

                const slipElement = (item.slipUrl && item.slipUrl !== "ไม่มีการแนบรูปภาพ") 
                    ? `<a href="${item.slipUrl}" target="_blank" class="view-slip-btn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        ดูสลิป
                       </a>` 
                    : `<span class="no-slip-text">ไม่มีหลักฐาน</span>`;

                const row = `<tr>
                    <td><span style="font-weight:600; color:#1e293b;">${item.studentId}</span></td>
                    <td style="color:#334155;">${formattedDate}</td>
                    <td>${slipElement}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function logout() {
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
