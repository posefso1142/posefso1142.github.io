<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบหลังบ้านแอดมิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif !important;
        }
        .container.dashboard {
            max-width: 950px;
            width: 95%;
            margin: 40px auto;
            box-sizing: border-box;
        }
        
        /* สไตล์ปรับปรุงหัวข้อหลักให้รองรับมือถือ */
        .dashboard-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 25px;
            color: #1e293b;
        }
        /* บนคอมจอใหญ่ ให้ซ่อนการตัดบรรทัดบังคับ */
        .dashboard-title br.mobile-br {
            display: none;
        }

        /* โซนตัวกรองมินิมอล */
        .filter-section {
            background: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }
        .filter-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin: 0;
        }
        .filter-input-wrapper {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .filter-input-wrapper input[type="date"] {
            padding: 10px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.95rem;
            color: #333;
            outline: none;
            transition: border-color 0.2s;
            background: #fff;
            -webkit-appearance: none;
        }
        .filter-input-wrapper input[type="date"]:focus {
            border-color: #3b82f6;
        }
        .date-separator {
            font-size: 0.95rem;
            font-weight: 500;
            color: #64748b;
        }
        .clear-filter-btn {
            background: #f1f5f9;
            color: #64748b;
            border: none;
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .clear-filter-btn:hover {
            background: #e2e8f0;
            color: #334155;
        }

        /* โครงสร้างตารางหลัก */
        .table-responsive {
            overflow-x: auto;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            background: #fff;
            width: 100%;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: fixed; 
        }
        
        /* กำหนดขนาดคอลัมน์มาตรฐานบนหน้าจอคอม */
        th:nth-child(1), td:nth-child(1) { width: 20%; }
        th:nth-child(2), td:nth-child(2) { width: 45%; }
        th:nth-child(3), td:nth-child(3) { width: 35%; }

        th, td {
            padding: 16px 20px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.95rem;
            vertical-align: middle;
            white-space: nowrap; 
            box-sizing: border-box;
        }
        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        tr:hover {
            background-color: #f8fafc;
        }

        /* ปุ่ม ดูสลิป ดีไซ็นพรีเมียม */
        .view-slip-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white !important;
            text-decoration: none !important;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }
        .view-slip-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3);
            filter: brightness(1.05);
        }
        .view-slip-btn:active {
            transform: translateY(1px);
        }
        .no-slip-text {
            color: #94a3b8;
            font-size: 0.9rem;
            font-style: italic;
        }
        .loading-text {
            text-align: center;
            padding: 30px;
            font-size: 1.1rem;
            color: #64748b;
        }
        .logout-btn {
            background: #ef4444 !important;
            margin-top: 25px;
            width: auto !important;
            padding: 10px 25px !important;
            float: right;
            border-radius: 10px;
        }

        /* ==================== Responsive Style (สำหรับหน้าจอมือถือ) ==================== */
        @media (max-width: 600px) {
            .container.dashboard {
                margin: 15px auto;
                padding: 10px !important;
                width: 98%; /* ขยายหน้าต่างหลักให้กว้างขึ้นเพื่อใช้พื้นที่คุ้ม ๆ */
            }
            .dashboard-title {
                font-size: 1.5rem;
                margin-bottom: 15px;
            }
            .dashboard-title br.mobile-br {
                display: block;
            }
            .filter-section {
                flex-direction: column;
                align-items: stretch;
                padding: 12px;
                text-align: center;
                margin-bottom: 15px;
            }
            .filter-input-wrapper {
                flex-direction: column;
                width: 100%;
            }
            .filter-input-wrapper input[type="date"], .clear-filter-btn {
                width: 100%;
                box-sizing: border-box;
            }
            .date-separator {
                margin: 2px 0;
            }
            
            /* [แก้ไขจุดนี้] ปิดระบบเลื่อนสไลด์ด้านข้าง และขยายตารางให้กางเต็มหน้าจอมือถือพอดี 100% */
            .table-responsive {
                overflow-x: hidden !important; /* ห้ามสไลด์ออกนอกขอบจอ */
                width: 100% !important;
            }
            table {
                table-layout: fixed !important;
                width: 100% !important;
            }
            
            /* เฉลี่ยพื้นที่คอลัมน์ใหม่ตามสัดส่วนสายตาบนมือถือ (เต็มจอพอดีเป๊ะ) */
            th:nth-child(1), td:nth-child(1) { width: 18% !important; text-align: center; }
            th:nth-child(2), td:nth-child(2) { width: 44% !important; text-align: center; }
            th:nth-child(3), td:nth-child(3) { width: 38% !important; text-align: center; }

            th, td {
                padding: 12px 4px !important; /* ลดช่องว่างภายในให้กระชับ เพื่อใช้พื้นที่คุ้มที่สุด */
                font-size: 0.85rem;  
                white-space: nowrap; 
            }
            .view-slip-btn {
                padding: 6px 0 !important; /* ปรับปุ่มให้ยืดเต็มช่องคอลัมน์พอดี */
                font-size: 0.8rem !important;
                display: flex !important; 
                width: 100%;
            }
            .view-slip-btn svg {
                display: none !important; /* ซ่อนไอคอนบนมือถือเพื่อประหยัดพื้นที่ */
            }
        }
    </style>
</head>
<body>
    <script>
        if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
            alert('กรุณาเข้าสู่ระบบก่อนครับ');
            window.location.href = 'admin-login.html';
        }
    </script>

    <div class="container dashboard">
        <h1 class="dashboard-title">ข้อมูลการจ่ายเงิน <br class="mobile-br">(แอดมิน)</h1>

        <div class="filter-section">
            <p class="filter-title">รายการชำระเงินทั้งหมด</p>
            <div class="filter-input-wrapper">
                <input type="date" id="startDate" onchange="filterAndRenderData()" placeholder="เริ่ม">
                <span class="date-separator">ถึง</span>
                <input type="date" id="endDate" onchange="filterAndRenderData()" placeholder="สิ้นสุด">
                <button class="clear-filter-btn" onclick="clearFilter()">แสดงทั้งหมด</button>
            </div>
        </div>

        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th style="text-align: center;">เลขที่</th>
                        <th style="text-align: center;">วันที่จ่าย</th>
                        <th style="text-align: center;">หลักฐาน</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <tr>
                        <td colspan="3" class="loading-text">กำลังดึงข้อมูลจาก Google Sheets...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </div>

    <script>
        const googleAppsScriptUrl = "https://script.google.com/macros/s/AKfycbw4JEb0sbTjHAKZlX2_Ecxp-5Wp8fuXymfQjcrnAbT9F9i6Md3P8a1Iz7XDveQEhHiu/exec"; 
        let rawData = [];

        async function fetchSheetData() {
            try {
                const response = await fetch(googleAppsScriptUrl);
                const data = await response.json();
                rawData = data;
                filterAndRenderData();
            } catch (error) {
                console.error("Error fetching data:", error);
                document.getElementById('dataTableBody').innerHTML = `
                    <tr><td colspan="3" style="text-align:center; color:#ef4444; font-weight:500; padding:20px;">
                        ไม่สามารถดึงข้อมูลได้อัตโนมัติ กรุณาเช็กการ Deploy บน Apps Script อีกครั้งครับ
                    </td></tr>`;
            }
        }

        function clearFilter() {
            document.getElementById('startDate').value = '';
            document.getElementById('endDate').value = '';
            filterAndRenderData();
        }

        function parseSheetDate(dateStr) {
            if (!dateStr) return null;
            let cleanStr = String(dateStr).split(/[ T]/)[0]; 
            const parsedDate = new Date(cleanStr + "T00:00:00");
            return isNaN(parsedDate.getTime()) ? null : parsedDate;
        }

        function filterAndRenderData() {
            const startVal = document.getElementById('startDate').value; 
            const endVal = document.getElementById('endDate').value; 
            let filtered = [...rawData];

            const startDateObj = startVal ? new Date(startVal + "T00:00:00") : null;
            const endDateObj = endVal ? new Date(endVal + "T23:59:59") : null;

            if (startDateObj || endDateObj) {
                filtered = filtered.filter(item => {
                    const currentDateObj = parseSheetDate(item.paymentDate);
                    if (!currentDateObj) return false; 

                    const currentTime = currentDateObj.getTime();

                    if (startDateObj && !endDateObj) {
                        return currentTime >= startDateObj.getTime();
                    }
                    if (!startDateObj && endDateObj) {
                        return currentTime <= endDateObj.getTime();
                    }
                    return currentTime >= startDateObj.getTime() && currentTime <= endDateObj.getTime();
                });
            }

            // จัดเรียงข้อมูล: ตามเลขที่จาก น้อย -> มาก (1, 2, 3...)
            filtered.sort((a, b) => {
                return parseInt(a.studentId) - parseInt(b.studentId);
            });

            const tbody = document.getElementById('dataTableBody');
            tbody.innerHTML = '';

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b; padding:20px;">ไม่พบข้อมูลในช่วงวันที่เลือก</td></tr>';
                return;
            }

            filtered.forEach(item => {
                const dateObj = parseSheetDate(item.paymentDate);
                const formattedDate = !dateObj ? item.paymentDate : dateObj.toLocaleDateString('th-TH', {
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric'
                });

                let hasSlip = false;
                if (item.slipUrl) {
                    const urlStr = String(item.slipUrl).trim();
                    if (urlStr !== "" && urlStr !== "ไม่มีการแนบรูปภาพ" && urlStr.startsWith("http")) {
                        hasSlip = true;
                    }
                }

                const slipElement = hasSlip 
                    ? `<a href="${item.slipUrl.trim()}" target="_blank" class="view-slip-btn">
                        ดูสลิป
                       </a>` 
                    : `<span class="no-slip-text">ไม่มีหลักฐาน</span>`;

                const row = `<tr>
                    <td style="text-align: center;"><span style="font-weight:600; color:#1e293b;">${item.studentId}</span></td>
                    <td style="color:#334155; text-align: center;">${formattedDate}</td>
                    <td style="text-align: center;">${slipElement}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }

        function logout() {
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        window.onload = fetchSheetData;
    </script>
</body>
</html>
