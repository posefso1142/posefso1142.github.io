<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แผงควบคุมแอดมิน (Admin Portal)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            font-family: 'Prompt', sans-serif !important;
            background-color: #f8fafc;
            margin: 0;
            padding: 0;
        }
        .container.dashboard {
            max-width: 950px;
            width: 95%;
            margin: 40px auto;
            box-sizing: border-box;
        }
        .dashboard-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            line-height: 1.3;
            margin-bottom: 30px;
            color: #1e293b;
        }

        /* เมนูหลัก - หน้าทางเลือกฟังก์ชัน (Portal Grid) */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 35px;
        }
        .portal-card {
            background: #fff;
            padding: 30px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            text-decoration: none !important;
            color: #334155;
            transition: all 0.2s ease-in-out;
            border: 1px solid #f1f5f9;
        }
        .portal-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.1);
            border-color: #3b82f6;
        }
        .portal-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            display: inline-block;
        }
        .portal-card h2 {
            font-size: 1.3rem;
            font-weight: 700;
            margin: 0 0 10px 0;
            color: #1e293b;
        }
        .portal-card p {
            font-size: 0.95rem;
            color: #64748b;
            margin: 0;
        }

        /* โซนควบคุม QR Code */
        .qr-control-section {
            background: #fff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 25px;
        }
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .section-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #1e293b;
            margin: 0;
        }
        .current-status {
            background: #eff6ff;
            color: #2563eb;
            padding: 6px 16px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
        }

        /* ตารางปุ่มกดเลือกจำนวนเงิน */
        .price-btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 12px;
        }
        .price-btn {
            background: #f8fafc;
            color: #334155;
            border: 1px solid #e2e8f0;
            padding: 14px 10px;
            border-radius: 12px;
            font-family: 'Prompt', sans-serif;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s ease;
            text-align: center;
        }
        .price-btn:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #1e293b;
        }
        .price-btn.active {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border-color: #2563eb;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25);
        }

        /* ปุ่มออกจากระบบ */
        .logout-btn {
            background: #ef4444 !important;
            border: none;
            color: white;
            padding: 12px 30px !important;
            font-family: 'Prompt', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 10px;
            float: right;
            transition: background 0.2s;
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.15);
        }
        .logout-btn:hover {
            background: #dc2626 !important;
        }

        /* Responsive สำหรับมือถือ */
        @media (max-width: 600px) {
            .container.dashboard {
                margin: 20px auto;
                width: 92%;
            }
            .dashboard-title {
                font-size: 1.6rem;
                margin-bottom: 20px;
            }
            .portal-grid {
                grid-template-columns: 1fr;
                gap: 15px;
            }
            .qr-control-section {
                padding: 20px 15px;
            }
            .section-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 8px;
            }
            .price-btn-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            .price-btn {
                padding: 10px 5px;
                font-size: 0.95rem;
                border-radius: 8px;
            }
            .logout-btn {
                width: 100%;
                float: none;
                text-align: center;
                margin-top: 15px;
            }
        }
    </style>
</head>
<body>
    <script>
        // ระบบรักษาความปลอดภัยตรวจสอบสถานะการ Login
        const permanentLogin = localStorage.getItem('isAdminLoggedIn');
        const temporaryLogin = sessionStorage.getItem('isAdminLoggedIn');

        if (permanentLogin !== 'true' && temporaryLogin !== 'true') {
            window.location.href = 'admin-login.html';
        }
    </script>

    <div class="container dashboard">
        <h1 class="dashboard-title">แผงควบคุมแอดมิน</h1>

        <div class="portal-grid">
            <a href="admin-history.html" class="portal-card">
                <span class="portal-icon">📊</span>
                <h2>ประวัติการจ่ายเงิน</h2>
                <p>ดูประวัติ ตรวจสอบความถูกต้อง และสลิปโอนเงินของลูกค้าทั้งหมด</p>
            </a>

            <div class="portal-card" style="cursor: default; border-color: #e2e8f0; background: #fafafa;">
                <span class="portal-icon">⚙️</span>
                <h2>ควบคุมระบบ QR Code</h2>
                <p>ตั้งค่าจำนวนเงินและควบคุมยอดสแกนรับเงินแบบ Real-time ด้านล่าง</p>
            </div>
        </div>

        <div class="qr-control-section">
            <div class="section-header">
                <p class="section-title">ตั้งค่าจำนวนเงินใน Payment Page</p>
                <div class="current-status">สถานะปัจจุบัน: <span id="currentPriceLabel">กำลังโหลด...</span> บาท</div>
            </div>

            <div class="price-btn-grid" id="priceBtnContainer">
                </div>
        </div>

        <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
    </div>

    <script>
        // จำนวนราคาที่แอดมินต้องการให้เลือก (5, 10, 15, ..., 60)
        const prices = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50, 55, 60];
        
        // 🚨 สรุปแนวทางสำหรับส่งค่าไปบันทึก (เชื่อมต่อหลังบ้าน):
        // เนื่องจากเป็นเว็บสแตติก (HTML/JS) ทั่วไป การบันทึกราคาให้หน้า payment.html รู้ 
        // แนะนำให้ผูกกับฐานข้อมูล หรือหากใช้ Google Sheets / Apps Script อยู่แล้ว 
        // สามารถยิง API ไปบันทึกที่ตาราง Settings ใน Sheets ได้เลยครับ
        const savePriceApiUrl = "YOUR_GOOGLE_APPS_SCRIPT_URL_FOR_SAVING_PRICE";

        // ฟังก์ชันสร้างปุ่มกดราคาบนหน้าจอ
        function generatePriceButtons() {
            const container = document.getElementById('priceBtnContainer');
            container.innerHTML = '';
            
            prices.forEach(price => {
                const button = document.createElement('button');
                button.className = 'price-btn';
                button.id = `btn-${price}`;
                button.innerText = `${price} บาท`;
                button.onclick = () => updateSystemPrice(price);
                container.appendChild(button);
            });
        }

        // ฟังก์ชันดึงราคาปัจจุบันที่ระบบตั้งไว้ (ดึงมาแสดงผลครั้งแรกตอนโหลดหน้าเว็บ)
        async function fetchCurrentPrice() {
            try {
                // ตัวอย่าง: ดึงค่าล่าสุดจาก localStorage ไว้เป็นค่าเริ่มต้นชั่วคราว
                // แต่ตอนใช้งานจริง แนะนำ fetch() ดึงจากฐานข้อมูล/Google Sheets ของคุณครับ
                const currentPrice = localStorage.getItem('globalPaymentPrice') || 50; 
                setActiveButton(currentPrice);
            } catch (error) {
                console.error("Error fetching current price:", error);
            }
        }

        // ฟังก์ชันเปลี่ยนสีปุ่มที่กำลังใช้งานอยู่
        function setActiveButton(price) {
            document.getElementById('currentPriceLabel').innerText = price;
            
            // ล้างสีปุ่มเดิมทั้งหมด
            document.querySelectorAll('.price-btn').forEach(btn => btn.classList.remove('active'));
            
            // ไฮไลต์ปุ่มปัจจุบัน
            const activeBtn = document.getElementById(`btn-${price}`);
            if (activeBtn) {
                activeBtn.classList.add('active');
            }
        }

        // ฟังก์ชันเมื่อแอดมินคลิกเปลี่ยนราคา
        async function updateSystemPrice(newPrice) {
            const confirmChange = confirm(`คุณต้องการเปลี่ยนยอดเงินในหน้าชำระเงินเป็น ${newPrice} บาท ใช่หรือไม่?`);
            if (!confirmChange) return;

            // แสดงสถานะว่ากำลังประมวลผล
            document.getElementById('currentPriceLabel').innerText = "...";

            try {
                // 1. เก็บลง LocalStorage เป็นหลักประกันฝั่ง Client ก่อน
                localStorage.setItem('globalPaymentPrice', newPrice);
                
                // 2. ตัวอย่างการส่งข้อมูลผ่าน API ไปยังหลังบ้าน/Google Sheets เพื่อให้หน้า payment.html ไปดึงต่อได้
                /*
                await fetch(savePriceApiUrl, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'setPrice', price: newPrice }),
                    headers: { 'Content-Type': 'application/json' }
                });
                */

                // อัปเดต UI เมื่อสำเร็จ
                setActiveButton(newPrice);
                alert(`เปลี่ยนระบบชำระเงินเป็น ${newPrice} บาท เรียบร้อยแล้ว! หน้าสแกนคิวอาร์โค้ดของลูกค้าจะอัปเดตทันที`);

            } catch (error) {
                console.error("Error updating price:", error);
                alert("เกิดข้อผิดพลาดในการบันทึกราคาไปยังเซิร์ฟเวอร์ กรุณาลองใหม่อีกครั้ง");
                fetchCurrentPrice(); // ดึงค่าเดิมกลับมาแสดง
            }
        }

        // ล้างสถานะเมื่อกดออกจากระบบ
        function logout() {
            localStorage.removeItem('isAdminLoggedIn');
            sessionStorage.removeItem('isAdminLoggedIn');
            window.location.href = 'admin-login.html';
        }

        // เริ่มต้นทำงานเมื่อเปิดหน้าเว็บ
        window.onload = function() {
            generatePriceButtons();
            fetchCurrentPrice();
        };
    </script>
</body>
</html>
