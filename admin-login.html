<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบแอดมิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        /* ยัดความมินิมอล โมเดิร์น ลงตรงนี้ */
        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }
        .back-btn:hover {
            color: #666;
        }

        /* ดีไซน์มินิมอลสำหรับตัวเลือกจดจำฉัน */
        .remember-container {
            display: flex;
            align-items: center;
            margin: 18px 0;
            cursor: pointer;
            user-select: none;
            font-size: 0.9rem;
            color: #555;
            transition: color 0.2s ease;
        }

        .remember-container:hover {
            color: #222;
        }

        /* ซ่อนหน้าตาเดิมของ checkbox ที่ไม่สวย */
        .remember-container input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
            height: 0;
            width: 0;
        }

        /* สร้างกล่องติ๊กแบบมินิมอลขึ้นมาเอง */
        .custom-checkbox {
            position: relative;
            display: inline-block;
            width: 18px;
            height: 18px;
            background-color: #fff;
            border: 1.5px solid #e0e0e0;
            border-radius: 5px; /* มน ๆ กำลังดี */
            margin-right: 10px;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ตอนที่ Hover กล่อง */
        .remember-container:hover input ~ .custom-checkbox {
            border-color: #adadad;
        }

        /* ตอนที่ติ๊กเลือก (Checked) */
        .remember-container input:checked ~ .custom-checkbox {
            background-color: #000; /* ดำมินิมอล คลีนๆ หรือเปลี่ยนเป็นสีธีมเว็บได้เลย */
            border-color: #000;
        }

        /* เครื่องหมายติ๊กถูกด้านใน */
        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 5px;
            top: 2px;
            width: 4px;
            height: 8px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* โชว์ติ๊กถูกตอนกดยืนยัน */
        .remember-container input:checked ~ .custom-checkbox::after {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ผู้ดูแลระบบ (Admin)</h1>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUser">Username</label>
                <input type="text" id="adminUser" placeholder="กรอกชื่อผู้ใช้" required>
            </div>
            <div class="form-group">
                <label for="adminPass">Password</label>
                <input type="password" id="adminPass" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <label class="remember-container">
                <input type="checkbox" id="rememberMe">
                <span class="custom-checkbox"></span>
                <span>จดจำฉันในระบบ</span>
            </label>

            <button type="submit">เข้าสู่ระบบ</button>
            <a href="index.html" class="back-btn">ย้อนกลับหน้าหลัก</a>
        </form>
    </div>

    <script>
        // เช็กสถานะตอนเปิดเว็บ
        if (localStorage.getItem('isAdminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (user === 'ADMIN_SMTE20' && pass === 'SMTE_202020') {
                if (rememberMe) {
                    localStorage.setItem('isAdminLoggedIn', 'true');
                    sessionStorage.removeItem('isAdminLoggedIn');
                } else {
                    sessionStorage.setItem('isAdminLoggedIn', 'true');
                    localStorage.removeItem('isAdminLoggedIn');
                }
                window.location.href = 'admin-dashboard.html';
            } else {
                alert('Username หรือ Password ไม่ถูกต้อง!');
            }
        });
    </script>
</body>
</html>
