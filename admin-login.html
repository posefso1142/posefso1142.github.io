<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบแอดมิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .back-btn {
            display: block;
            margin-top: 20px;
            text-align: center;
            color: #a0a0a0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s ease;
        }
        .back-btn:hover {
            color: #666;
        }
        .remember-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin: 20px 0;
            cursor: pointer;
            user-select: none;
            font-size: 0.95rem;
            color: #475569;
            transition: color 0.2s ease;
        }
        .remember-container:hover {
            color: #1e293b;
        }
        .remember-container input.minimal-checkbox {
            position: absolute !important;
            opacity: 0 !important;
            width: 0 !important;
            height: 0 !important;
            margin: 0 !important;
            padding: 0 !important;
            display: none !important;
        }
        .custom-checkbox {
            display: inline-block;
            box-sizing: border-box;
            width: 20px !important;
            height: 20px !important;
            min-width: 20px !important;
            min-height: 20px !important;
            background-color: #f8fafc !important; 
            border: 1.5px solid #cbd5e1 !important;
            border-radius: 6px !important;
            margin-right: 10px !important;
            position: relative;
            transition: all 0.2s ease;
        }
        .remember-container:hover .custom-checkbox {
            border-color: #3b82f6 !important;
        }
        .remember-container input.minimal-checkbox:checked ~ .custom-checkbox {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%) !important;
            border-color: #2563eb !important;
        }
        .custom-checkbox::after {
            content: "";
            position: absolute;
            display: none;
            left: 6px;
            top: 2px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .remember-container input.minimal-checkbox:checked ~ .custom-checkbox::after {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>ผู้ดูแลระบบ (Admin)</h1>
        <form id="adminLoginForm">
            <div class="form-group">
                <label for="adminUser">Username</label>
                <input type="text" id="adminUser" placeholder="กรอกชื่อผู้ใช้" required>
            </div>
            <div class="form-group">
                <label for="adminPass">Password</label>
                <input type="password" id="adminPass" placeholder="กรอกรหัสผ่าน" required>
            </div>
            
            <label class="remember-container">
                <input type="checkbox" id="rememberMe" class="minimal-checkbox">
                <span class="custom-checkbox"></span>
                <span>จดจำฉันในระบบ</span>
            </label>

            <button type="submit" id="submitBtn">เข้าสู่ระบบ</button>
            <a href="index.html" class="back-btn">ย้อนกลับหน้าหลัก</a>
        </form>
    </div>

    <script>
        // ใส่ URL ของ Google Apps Script ของคุณ
        const googleAppsScriptUrl = "https://script.google.com/macros/s/AKfycbw4JEb0sbTjHAKZlX2_Ecxp-5Wp8fuXymfQjcrnAbT9F9i6Md3P8a1Iz7XDveQEhHiu/exec";

        // เช็กสถานะก่อนเข้าหน้าเว็บ ถ้าเคยล็อกอินค้างไว้ให้กระโดดไปหน้า Dashboard ทันที
        if (localStorage.getItem('isAdminLoggedIn') === 'true') {
            window.location.href = 'admin-dashboard.html';
        }

        document.getElementById('adminLoginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            const rememberMe = document.getElementById('rememberMe').checked;
            const submitBtn = document.getElementById('submitBtn');

            // เปลี่ยนสถานะปุ่มป้องกันการกดซ้ำ
            submitBtn.disabled = true;
            submitBtn.innerText = "กำลังตรวจสอบ...";

            try {
                // ส่ง Username และ Password ไปเช็กผลลัพธ์ที่หลังบ้าน (Apps Script)
                const response = await fetch(googleAppsScriptUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ 
                        'action': 'login', 
                        'username': user, 
                        'password': pass 
                    })
                });

                const result = await response.json();

                // ตรวจคำตอบที่ส่งกลับมาจาก Google Apps Script หลังบ้าน
                if (result.status === "success") {
                    if (rememberMe) {
                        localStorage.setItem('isAdminLoggedIn', 'true');
                        sessionStorage.removeItem('isAdminLoggedIn');
                    } else {
                        sessionStorage.setItem('isAdminLoggedIn', 'true');
                        localStorage.removeItem('isAdminLoggedIn');
                    }
                    // ถ้ารหัสถูกต้อง ย้ายไปหน้าแดชบอร์ด
                    window.location.href = 'admin-dashboard.html';
                } else {
                    alert('Username หรือ Password ไม่ถูกต้อง!');
                    submitBtn.disabled = false;
                    submitBtn.innerText = "เข้าสู่ระบบ";
                }

            } catch (error) {
                console.error("Error:", error);
                alert('เกิดข้อผิดพลาดในการเชื่อมต่อระบบหลังบ้าน กรุณาลองใหม่อีกครั้ง');
                submitBtn.disabled = false;
                submitBtn.innerText = "เข้าสู่ระบบ";
            }
        });
    </script>
</body>
</html>
