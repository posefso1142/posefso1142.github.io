<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ยืนยันข้อมูลและส่งหลักฐาน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>ยืนยันข้อมูล</h1>
        <p>โปรดตรวจสอบข้อมูลและอัปโหลดหลักฐานการโอนเงิน</p>
        
        <div class="info-group">
            <p><strong>เลขที่:</strong> <span id="displayStudentId">กำลังโหลด...</span></p>
            <p><strong>วันที่:</strong> <span id="displayPaymentDate">กำลังโหลด...</span></p>
        </div>
        
        <div class="form-group" style="margin-bottom: 24px; text-align: left;">
            <label style="display: block; font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; color: var(--dark-text); padding-left: 4px;">หลักฐานการโอนเงิน</label>
            
            <div class="upload-card" id="uploadZone">
                <div class="upload-icon">📸</div>
                <div class="upload-hint" id="statusText">กดตรงนี้เพื่อเลือกรูปสลิป</div>
                <div class="upload-sub-hint">รองรับไฟล์รูปภาพทุกชนิด</div>
                
                <div class="preview-container" id="previewBox">
                    <img id="imagePreview" src="" alt="Slip Preview">
                </div>
                
                <input type="file" id="slipUpload" accept="image/*" required>
            </div>
        </div>
        
        <div class="button-container">
            <button id="backButton" type="button">ย้อนกลับ</button>
            <button id="nextButton" type="button">ยืนยันการส่ง</button>
        </div>
    </div>

    <script>
        const studentId = localStorage.getItem('studentId');
        const paymentDate = localStorage.getItem('paymentDate');

        if (!studentId || !paymentDate) {
            alert('ไม่พบข้อมูลการลงทะเบียน กรุณากรอกข้อมูลใหม่อีกครั้ง');
            window.location.href = 'index.html';
        } else {
            document.getElementById('displayStudentId').textContent = studentId;
            document.getElementById('displayPaymentDate').textContent = paymentDate;
        }

        const googleAppsScriptUrl = "https://script.google.com/macros/s/AKfycbxC1MRYwueTMJ4OXai1gs9zZK0Z__M6ifCLM5_WnFDqXjyt_sLWs0VTclR2EURt3IRosA/exec"; 

        const slipInput = document.getElementById('slipUpload');
        const previewBox = document.getElementById('previewBox');
        const imagePreview = document.getElementById('imagePreview');
        const statusText = document.getElementById('statusText');
        const nextButton = document.getElementById('nextButton');
        const backButton = document.getElementById('backButton');

        slipInput.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewBox.style.display = 'block';
                    statusText.textContent = "เปลี่ยนรูปภาพสลิป";
                    statusText.style.color = "var(--ios-green)"; 
                }
                reader.readAsDataURL(file);
            }
        });

        backButton.addEventListener('click', function() {
            window.location.href = 'payment.html';
        });

        nextButton.addEventListener('click', function() {
            const slipFile = slipInput.files[0];
            if (!slipFile) {
                alert('กรุณาอัปโหลดสลิปก่อนส่งข้อมูลครับ');
                return;
            }

            nextButton.disabled = true;
            nextButton.textContent = "กำลังส่งข้อมูล...";

            const reader = new FileReader();
            reader.onloadend = function() {
                const base64Data = reader.result.split(',')[1];
                const formData = {
                    studentId: studentId,
                    paymentDate: paymentDate,
                    slipData: base64Data,
                    mimeType: slipFile.type,
                    fileName: slipFile.name
                };

                fetch(googleAppsScriptUrl, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams(formData)
                }).then(response => {
                    window.location.href = 'thankyou.html';
                }).catch(error => {
                    console.error('Error:', error);
                    alert('เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้งครับ');
                    nextButton.disabled = false;
                    nextButton.textContent = "ยืนยันการส่ง";
                });
            };
            reader.readAsDataURL(slipFile);
        });
    </script>
</body>
</html>
