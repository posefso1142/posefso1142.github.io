<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จ่ายเงิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="admin-login.html" class="admin-btn" title="เข้าสู่ระบบแอดมิน">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 119 0 4.5 4.5 0 01-9 0zM3.751 20.105a8.25 8.25 0 0116.498 0 .75.75 0 01-.437.695A18.683 18.683 0 0112 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 01-.437-.695z" clip-rule="evenodd" />
        </svg>
    </a>

    <div class="container">
        <h1>จ่ายเงินประจำสัปดาห์</h1>
        <form onsubmit="return false;"> 
            <div class="form-group">
                <label for="studentId">เลขที่ของคุณ</label>
                <input type="number" id="studentId" placeholder="กรอกเฉพาะตัวเลข เช่น 1" required>
            </div>
            <div class="form-group">
                <label for="paymentDate">วันที่จ่าย</label>
                <input type="date" id="paymentDate" required>
            </div>
            <button type="button" onclick="goToNextPage()">ถัดไป</button>
        </form>
    </div>

    <script>
        // ฟังก์ชันสั่งย้ายหน้าแบบบังคับตรง ๆ จากปุ่ม
        function goToNextPage() {
            const studentId = document.getElementById('studentId').value;
            const paymentDate = document.getElementById('paymentDate').value;
            
            // เช็กว่ากรอกข้อมูลหรือยัง
            if (!studentId || !paymentDate) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วนก่อนน้า');
                return;
            }

            // บันทึกข้อมูลลงเครื่อง
            localStorage.setItem('studentId', studentId);
            localStorage.setItem('paymentDate', paymentDate);

            // บังคับเปลี่ยนหน้าทันที ไปยังหน้า payment.html
            window.location.href = 'payment.html';
        }
    </script>
</body>
</html>
