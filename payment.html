<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าโอนเงิน</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>หน้าโอนเงิน</h1>
        <p>โปรดสแกน QR Code เพื่อโอนเงิน:</p>
        <div class="qr-box">
            <h2 style="color: #0d47a1;">QR Code สำหรับการโอนเงิน</h2>
            
            <img id="qrCodeImage" src="my-qr-code.png" alt="QR Code" style="width: 200px; height: 200px;">
            
            <p id="priceText">กำลังตรวจสอบยอดเงิน...</p>
        </div>
        <div class="button-container">
            <button id="transferComplete" style="background-color: #03a9f4;">โอนเสร็จสิ้นแล้ว</button>
        </div>
    </div>
    
    <script>
        // ปุ่มโอนเสร็จสิ้นทำงานเหมือนเดิม
        document.getElementById('transferComplete').addEventListener('click', function() {
            window.location.href = 'confirm.html';
        });

        // ========================================================
        // ส่วนของฟังก์ชันตรวจสอบประวัติและเปลี่ยน QR Code อัตโนมัติ
        // ========================================================
        
        async function checkAndSwitchQR() {
            const qrImage = document.getElementById("qrCodeImage");
            const priceText = document.getElementById("priceText");

            // 1. ระบุชื่อไฟล์รูปภาพ QR Code ของนายตรงนี้
            const qr50Url = "qr-code-50.png"; // เปลี่ยนเป็นชื่อไฟล์คิวอาร์ 50 บาทของนาย
            const qr70Url = "my-qr-code.png";  // ใช้คิวอาร์เดิมสำหรับยอด 70 บาท

            // 2. ดึงเลขที่ (studentId) ของคนที่กำลังใช้งาน
            const studentId = sessionStorage.getItem("studentId") || localStorage.getItem("studentId");
            
            if (!studentId) {
                console.warn("ไม่พบรหัส studentId ระบบจะปรับเป็นยอด 70 บาทอัตโนมัติ");
                qrImage.src = qr70Url;
                priceText.innerHTML = "ยอดเงิน: 70 บาท <span class='sub-text' style='color: #7f8c8d;'>(ไม่พบข้อมูลผู้ใช้)</span>";
                return;
            }

            // 3. ใส่รหัส Google Sheet ID ของตารางในรูปแรกตรงนี้
            const sheetId = "1QlUHO9UW_1JLPK_kLAd2DOfBj8EIZBqvCOYCoV0bhso"; 
            const url = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(url);
                const text = await response.text();
                
                // แปลงข้อความที่ได้จาก Google Sheet ให้เป็น JSON
                const jsonData = JSON.parse(text.substring(47, text.length - 2));
                const rows = jsonData.table.rows;

                // ตั้งรอบวันที่ตรวจจับ: 9 มิ.ย. 2026 ถึง 13 มิ.ย. 2026
                const startDate = new Date("2026-06-09T00:00:00");
                const endDate = new Date("2026-06-13T23:59:59");
                
                let hasPaidThisWeek = false;

                // --- วางลูปตรวจเช็กแบบใหม่ที่ปรับปรุงแล้วตรงนี้ ---
                for (let row of rows) {
                    const rowStudentId = row.c[1] ? row.c[1].v : null;     
                    const rowPaymentDateStr = row.c[2] ? (row.c[2].f || row.c[2].v) : null; 

                    if (rowStudentId && Number(rowStudentId) === Number(studentId)) {
                        if (rowPaymentDateStr) {
                            const cleanDateStr = String(rowPaymentDateStr).split(" ")[0]; 
                            const pDate = new Date(cleanDateStr + "T00:00:00");

                            if (pDate >= startDate && pDate <= endDate) {
                                hasPaidThisWeek = true;
                                break; 
                            }
                        }
                    }
                }
                // --------------------------------------------------

                // 4. สลับรูป QR Code และเปลี่ยนข้อความยอดเงินแบบแยกบรรทัด
                if (hasPaidThisWeek) {
                    qrImage.src = qr50Url;
                    priceText.style.color = "#2e7d32"; // ยอดเงินหลักสีเขียว
                    priceText.innerHTML = "ยอดเงิน: 50 บาท <span class='sub-text' style='color: #4caf50;'>(เนื่องจากจ่ายเงินห้องสัปดาห์นี้แล้ว)</span>";
                } else {
                    qrImage.src = qr70Url;
                    priceText.style.color = "#c62828"; // ยอดเงินหลักสีแดง
                    priceText.innerHTML = "ยอดเงิน: 70 บาท <span class='sub-text' style='color: #e53935;'>(ค้างจ่ายเงินห้องรอบสัปดาห์ 9-13 มิ.ย.)</span>";
                }

            } catch (error) {
                console.error("เชื่อมต่อฐานข้อมูลล้มเหลว:", error);
                qrImage.src = qr70Url;
                priceText.style.color = "#c62828";
                priceText.innerHTML = "ยอดเงิน: 70 บาท <span class='sub-text' style='color: #7f8c8d;'>(ระบบฐานข้อมูลขัดข้อง)</span>";
            }
        }

        window.onload = checkAndSwitchQR;
    </script>
</body>
</html>
